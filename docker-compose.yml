
services:
  db:
    image: postgres:17.2
    restart: always
    container_name: web-travel-backend
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: travel_db
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8.2.1
    restart: always
    ports: ["6379:6379"]
volumes:
  pgdata: